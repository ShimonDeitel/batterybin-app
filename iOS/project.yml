name: BatteryBin
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BatteryBin:
    type: application
    platform: iOS
    sources:
      - path: BatteryBin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batterybin
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BatteryBin/Info.plist
        CODE_SIGN_ENTITLEMENTS: BatteryBin/BatteryBin.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatteryBinTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatteryBinTests
    dependencies:
      - target: BatteryBin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batterybin.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BatteryBin:
    build:
      targets:
        BatteryBin: all
        BatteryBinTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BatteryBinTests
    archive:
      config: Release
