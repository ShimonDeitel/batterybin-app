name: Batterybin
options:
  bundleIdPrefix: com.shimondeitel.batterybin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Batterybin:
    type: application
    platform: iOS
    sources:
      - path: Batterybin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batterybin
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Batterybin/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatterybinTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatterybinTests
      - path: Batterybin.storekit
    dependencies:
      - target: Batterybin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batterybin.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BatterybinUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BatterybinUITests
    dependencies:
      - target: Batterybin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.batterybin.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Batterybin:
    build:
      targets:
        Batterybin: all
        BatterybinTests: [test]
        BatterybinUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Batterybin.storekit
    test:
      config: Debug
      storeKitConfiguration: Batterybin.storekit
      targets:
        - BatterybinTests
        - BatterybinUITests
    archive:
      config: Release
